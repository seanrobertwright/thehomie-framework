channels:
  linkedin:
    display_name: LinkedIn
    execution_method: browser
    cadence_enabled: true
    cadence_interval_hours: 24
    voice_profile: ""
    topic_pool:
      - industry insights
      - product updates
      - team wins
      - thought leadership
      - customer stories
    browser_workflow_id: linkedin.post.create

  facebook:
    display_name: Facebook
    execution_method: api
    cadence_enabled: true
    cadence_interval_hours: 24
    voice_profile: ""
    design_file: brand_designs/YourBrand.json
    topic_pool:
      - community updates
      - product news
      - tips and tricks
      - behind the scenes
    browser_workflow_id: null
    # Flip execution_method to "postiz" to publish through the Postiz lane.
    # Binding from the configured instance's channel list (dashboard Social tab).
    postiz_integration_id: ""

  x:
    display_name: X (Twitter)
    execution_method: manual
    cadence_enabled: true
    cadence_interval_hours: 12
    voice_profile: ""
    topic_pool:
      - hot takes
      - industry commentary
      - product launches
      - community engagement
    browser_workflow_id: x.post.create

  reddit:
    display_name: Reddit
    execution_method: browser
    cadence_enabled: false
    cadence_interval_hours: 48
    voice_profile: ""
    topic_pool:
      - value-add comments
      - community help
      - relevant discussions
    browser_workflow_id: reddit.post.create

  instagram:
    display_name: Instagram
    execution_method: api
    cadence_enabled: true
    cadence_interval_hours: 24
    voice_profile: ""
    design_file: brand_designs/YourBrand.json
    topic_pool:
      - visual content
      - stories
      - reels ideas
    browser_workflow_id: null
    postiz_integration_id: ""
    postiz_settings:
      post_type: post

  discord:
    display_name: Discord
    execution_method: manual
    cadence_enabled: false
    cadence_interval_hours: 24
    voice_profile: ""
    topic_pool: []
    browser_workflow_id: null

  # --- Postiz-transport channels (ship disabled; operator opt-in) ---------
  # Bind postiz_integration_id from the configured instance's channel list
  # (dashboard Social tab or GET /api/social/channels), then flip
  # cadence_enabled when ready.

  mastodon:
    display_name: Mastodon
    execution_method: postiz
    cadence_enabled: false
    cadence_interval_hours: 24
    voice_profile: ""
    topic_pool:
      - industry commentary
      - build-in-public updates
    browser_workflow_id: null
    postiz_integration_id: ""

  bluesky:
    display_name: Bluesky
    execution_method: postiz
    cadence_enabled: false
    cadence_interval_hours: 24
    voice_profile: ""
    topic_pool:
      - industry commentary
      - build-in-public updates
    browser_workflow_id: null
    postiz_integration_id: ""

  threads:
    display_name: Threads
    execution_method: postiz
    cadence_enabled: false
    cadence_interval_hours: 24
    voice_profile: ""
    topic_pool:
      - community updates
      - behind the scenes
    browser_workflow_id: null
    postiz_integration_id: ""

  youtube:
    display_name: YouTube
    execution_method: postiz
    cadence_enabled: false
    cadence_interval_hours: 168
    voice_profile: ""
    design_file: brand_designs/YourBrand.json
    topic_pool: []
    browser_workflow_id: null
    # Video platform — listed for channel visibility; the v1 executor
    # refuses video-required platforms (text/image only).
    postiz_integration_id: ""
    postiz_settings:
      visibility: public
