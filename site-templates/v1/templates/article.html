<!doctype html>
<html lang="en">
  <head>
    <!-- INCLUDE:head-meta -->
  </head>
  <body>
    <!-- INCLUDE:header -->
    <main>
      <section class="hero page-hero--cinematic" style="background-image:url('{{site.base}}/assets/{{page.hero_poster}}');">
<!-- IF:page.hero_video -->
        <video class="hero-video" autoplay muted loop playsinline preload="metadata" poster="{{site.base}}/assets/{{page.hero_poster}}" aria-hidden="true">
          <source data-src="{{site.base}}/assets/{{page.hero_webm}}" type="video/webm" />
          <source data-src="{{site.base}}/assets/{{page.hero_mp4}}" type="video/mp4" />
        </video>
<!-- ENDIF -->
        <div class="hero-copy">
          <p class="{{page.hero_label_class}}">{{copy.hero_label}}</p>
          <h1>{{copy.hero_headline}}</h1>
          <p class="page-lede">{{copy.hero_lede}}</p>
        </div>
      </section>

      <section class="section article-layout">
        <aside class="detail-nav">
<!-- BEGIN:copy.detail_nav -->
          <a href="{{.href}}">{{.label}}</a>
<!-- END:copy.detail_nav -->
        </aside>
        <article class="article-card">
          <p class="article-kicker">{{copy.kicker}}</p>
          <h2>{{copy.heading}}</h2>
          <p class="article-lede">{{copy.article_lede}}</p>

          <div class="article-sections">
<!-- BEGIN:copy.steps -->
            <section class="article-step">
              <span class="step-number">{{.num2}}</span>
              <div>
                <h3>{{.heading}}</h3>
                <p>{{.note}}</p>
              </div>
            </section>
<!-- END:copy.steps -->
          </div>

          <div class="resource-cta">
            <div>
              <h3>{{copy.resource_cta_heading}}</h3>
              <p>{{copy.resource_cta_note}}</p>
            </div>
            <a class="button secondary" href="{{site.cta_href}}">{{copy.resource_cta_label}}</a>
          </div>
        </article>
      </section>
    </main>
    <!-- INCLUDE:footer -->
  </body>
</html>
